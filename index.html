<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- CRITICAL FOR IPAD: Fixes mobile canvas resolution and stops microscopic auto-scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AAC Grid App</title>
  
  <style>
    /* Reset and Base Canvas to match image_51a2b9.png */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f4f6fa;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* Grid layout holding the responsive cards */
    .aac-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Exact Card Style matching image_51a2b9.png */
    .aac-tile {
      background-color: #ffffff;
      border: 1px solid #e5e9f0;
      border-radius: 16px;
      padding: 32px 24px 20px 24px; /* Added spacing to cushion the layout */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      aspect-ratio: 1 / 1; /* Guarantees tiles stay perfectly square on iPad */
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.02), 0 8px 16px -6px rgba(0, 0, 0, 0.02);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      
      /* Optimizes touch interactions for iOS Safari */
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* Tactile response when tapped on iPad */
    .aac-tile:active {
      transform: scale(0.97);
      background-color: #fcfdfe;
    }

    /* FIX 1: Fluid Icon Container (Maintains high-vis dimensions across different formats) */
    .tile-icon-container {
      width: 70%;  /* Controls how large the icon sits inside the square */
      height: 70%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: auto; /* Pushes text cleanly to the absolute bottom margin */
    }

    /* Forces SVGs, Local PNGs, or URL Images to scale identically inside the wrapper */
    .tile-icon-container img,
    .tile-icon-container svg {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Prevents stretching or clipping distortion */
    }

    /* Exact Text Label Typography from your design */
    .aac-label {
      font-size: 1.1rem;
      font-weight: 500;
      color: #2d3748;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <div class="aac-grid">
    
    <!-- TILE 1: ACTION -->
    <div class="aac-tile" data-audio="audio/action.mp3">
      <div class="tile-icon-container">
        <!-- ICON OPTION A: Inline SVG matching your blue action symbol -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="#2563eb">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 21l8.982-11.795H14.18l.818-5.205L6 15.904h3.813Z" />
        </svg>
        
        <!-- ICON OPTION B (Local File Placeholder): 
        <img src="assets/action.png" alt="Action"> 
        -->
        
        <!-- ICON OPTION C (Web URL Placeholder): 
        <img src="https://example.com/action-icon.png" alt="Action"> 
        -->
      </div>
      <div class="aac-label">Action</div>
    </div>

    <!-- TILE 2: PERSON -->
    <div class="aac-tile" data-audio="audio/person.mp3">
      <div class="tile-icon-container">
        <!-- ICON OPTION A: Inline SVG matching your green person symbol -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="#10b981">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
        </svg>
      </div>
      <div class="aac-label">Person</div>
    </div>

  </div>

  <script>
    // FIX 2: Global single-instance Audio pool to handle iOS Safari restrictions
    let iPadAudioPool = null;

    function playAACSound(audioUrl) {
      if (!audioUrl) return;

      // Lazy-instantiate the Audio element strictly inside the user execution thread
      if (!iPadAudioPool) {
        iPadAudioPool = new Audio();
      }

      try {
        // Synchronously bind the file target before the browser security window expires
        iPadAudioPool.src = audioUrl;
        
        // Clear old browser audio memory traces
        iPadAudioPool.load(); 
        
        const playPromise = iPadAudioPool.play();
        
        if (playPromise !== undefined) {
          playPromise.catch(error => {
            console.error("Audio block encountered on iPad:", error);
            // Reminder: Make sure the iPad hardware mute switch on the side/Control Center isn't enabled!
          });
        }
      } catch (e) {
        console.error("Audio engine failed to load resource:", e);
      }
    }

    // Modern event delegation loop targeting touch coordinates cleanly
    document.addEventListener('DOMContentLoaded', () => {
      const mainGrid = document.querySelector('.aac-grid');

      mainGrid.addEventListener('click', (event) => {
        const clickedCard = event.target.closest('.aac-tile');
        
        if (clickedCard) {
          const soundFilePath = clickedCard.getAttribute('data-audio');
          playAACSound(soundFilePath);
        }
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sentence Builder AAC</title>
  
  <style>
    /* Reset and Core Layout */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f7fb;
      padding: 20px;
    }

    /* Fluid Grid Container */
    .aac-grid {
      display: grid;
      /* Automatically fits columns based on screen width, min size 140px */
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Accessible Touch Target Tiles */
    .aac-tile {
      background-color: #ffffff;
      border: 3px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      /* Keeps tiles perfectly square regardless of column width */
      aspect-ratio: 1 / 1; 
      transition: transform 0.1s ease, border-color 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      
      /* Webkit optimizes touch delays on iPad */
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* Tactile response feedback on tap */
    .aac-tile:active {
      transform: scale(0.96);
      border-color: #3b82f6;
      background-color: #eff6ff;
    }

    /* FLUID ICON FIX: Icons scale smoothly based on tile size */
    .aac-icon-wrapper {
      width: 60%;
      height: 60%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .aac-icon-wrapper img,
    .aac-icon-wrapper svg {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Legible Label Typography */
    .aac-label {
      margin-top: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1e293b;
      text-align: center;
      word-break: break-word;
    }
  </style>
</head>
<body>

  <div class="aac-grid">
    
    <div class="aac-tile" data-sound="https://actions.google.com/sounds/v1/cartoon/slide_whistle_to_drum_hit.ogg">
      <div class="aac-icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#3b82f6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.05 4.575a1.5 1.5 0 0 0-1.93 1.93l1.757 5.273-5.273-1.757a1.5 1.5 0 0 0-1.93 1.93l5.273 1.757-1.757 5.273a1.5 1.5 0 0 0 1.93 1.93l5.273-1.757 1.757 5.273a1.5 1.5 0 0 0 1.93-1.93l-1.757-5.273 5.273 1.757a1.5 1.5 0 0 0 1.93-1.93l-5.273-1.757 1.757-5.273a1.5 1.5 0 0 0-1.93-1.93l-5.273 1.757 1.757-5.273Z" />
        </svg>
      </div>
      <div class="aac-label">Action</div>
    </div>

    <div class="aac-tile" data-sound="https://actions.google.com/sounds/v1/actions/snare_roll.ogg">
      <div class="aac-icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#10b981">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
        </svg>
      </div>
      <div class="aac-label">Person</div>
    </div>

  </div>

  <script>
    // IPAD AUDIO FIX: Maintain a single cached Audio Context or Audio Instance globally
    let audioPlaybackEngine = null;

    function playAACSound(soundUrl) {
      if (!soundUrl) return;

      // Lazy initialize the audio player object on the very first tap gesture
      if (!audioPlaybackEngine) {
        audioPlaybackEngine = new Audio();
      }

      // Explicitly change the source context synchronously
      audioPlaybackEngine.src = soundUrl;
      
      // iOS requires the .load() configuration to clear out old state strings
      audioPlaybackEngine.load();

      // Execute execution inside a synchronous promise handle
      const playPromise = audioPlaybackEngine.play();

      if (playPromise !== undefined) {
        playPromise.catch(error => {
          console.error("Audio playback muted or prevented by iOS safety context:", error);
          alert("Please verify your iPad is not toggled to Hardware Silent/Mute mode via Control Center.");
        });
      }
    }

    // Attach interaction events cleanly using event delegation
    document.addEventListener('DOMContentLoaded', () => {
      const gridContainer = document.querySelector('.aac-grid');

      // 'pointerdown' or 'click' handles events immediately along the main user action timeline
      gridContainer.addEventListener('click', (event) => {
        const targetedTile = event.target.closest('.aac-tile');
        
        if (targetedTile) {
          const audioUrl = targetedTile.getAttribute('data-sound');
          playAACSound(audioUrl);
        }
      });
    });
  </script>
</body>
</html>
